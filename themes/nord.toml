# Nord color palette — https://www.nordtheme.com
# Polar Night
[palette]
nord0  = "#2E3440"
nord1  = "#3B4252"
nord2  = "#434C5E"
nord3  = "#4C566A"
# Snow Storm
nord4  = "#D8DEE9"
nord5  = "#E5E9F0"
nord6  = "#ECEFF4"
# Frost
nord7  = "#8FBCBB"
nord8  = "#88C0D0"
nord9  = "#81A1C1"
nord10 = "#5E81AC"
# Aurora
nord11 = "#BF616A"
nord12 = "#D08770"
nord13 = "#EBCB8B"
nord14 = "#A3BE8C"
nord15 = "#B48EAD"

[colors]
background        = "nord0"
surface           = "nord1"
surface_elevated  = "nord2"
muted             = "nord3"
foreground        = "nord4"
foreground_bright = "nord5"
foreground_max    = "nord6"
accent            = "nord8"
accent_secondary  = "nord9"
link              = "nord10"
error             = "nord11"
warning           = "nord12"
info              = "nord13"
success           = "nord14"
special           = "nord15"

[ui]
sidebar_bg         = "nord1"
sidebar_selected   = "nord2"
sidebar_text       = "nord4"
message_list_bg    = "nord0"
message_selected   = "nord2"
message_unread     = "nord6"
message_read       = "nord4"
message_date       = "nord3"
message_sender     = "nord8"
preview_bg         = "nord0"
preview_headers    = "nord9"
preview_body       = "nord4"
preview_quote      = "nord3"
compose_bg         = "nord0"
compose_field      = "nord9"
compose_input      = "nord4"
status_bar_bg      = "nord1"
status_bar_text    = "nord4"
status_bar_accent  = "nord8"
border             = "nord3"
border_focused     = "nord8"

[icons]
unread    = "\u25CF"
read      = "\u25CB"
flagged   = "\u2605"
attachment = "\uD83D\uDCCE"
reply     = "\u21A9"
forward   = "\u21AA"
